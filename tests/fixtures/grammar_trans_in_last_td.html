<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Basic sentence order</title></head>
<body>
  <h1>Basic sentence order</h1>
  <h3>Subject-Verb-Object</h3>
  <table class="table-bordered">
    <tr><th>Chinese</th><th>Pinyin</th><th>English</th></tr>
    <tr>
      <td>我爱你。</td>
      <td>Wǒ ài nǐ.</td>
      <td>I love you.</td>
    </tr>
    <tr>
      <td>他是老师。</td>
      <td>Tā shì lǎoshī.</td>
      <td>He is a teacher.</td>
    </tr>
  </table>
</body>
</html>
