<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Basic sentence order</title></head>
<body>
  <h1>Basic sentence order</h1>
  <div class="liju-examples">
    <ul>
      <li>
        我 爱 你。
        <span class="pinyin">Wǒ ài nǐ.</span>
        <span class="trans">I love you.</span>
      </li>
      <li>
        他 是 老师。
        <span class="pinyin">Tā shì lǎoshī.</span>
        <span class="trans">He is a teacher.</span>
      </li>
    </ul>
  </div>
</body>
</html>
