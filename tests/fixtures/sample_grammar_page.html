<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Basic sentence order</title></head>
<body>
  <h1>Basic sentence order</h1>

  <h3>Subject-Verb</h3>
  <table class="table table-bordered big-text">
    <tr><th>Subject</th><th>Verb</th><th>Translation</th></tr>
    <tr>
      <td>你们<span class="pinyin">Nǐmen</span></td>
      <td>吃。<span class="pinyin">chī.</span></td>
      <td>You eat.</td>
    </tr>
    <tr>
      <td>他<span class="pinyin">Tā</span></td>
      <td>笑。<span class="pinyin">xiào.</span></td>
      <td>He laughs.</td>
    </tr>
  </table>

  <h3>Subject-Verb-Object</h3>
  <table class="table table-bordered big-text">
    <tr><th>Subject</th><th>Verb</th><th>Object</th><th>Translation</th></tr>
    <tr>
      <td>我<span class="pinyin">Wǒ</span></td>
      <td>爱<span class="pinyin">ài</span></td>
      <td>你。<span class="pinyin">nǐ.</span></td>
      <td>I love you.</td>
    </tr>
    <tr>
      <td>我们<span class="pinyin">Wǒmen</span></td>
      <td>是<span class="pinyin">shì</span></td>
      <td>学生。<span class="pinyin">xuésheng.</span></td>
      <td>We are students.</td>
    </tr>
  </table>
</body>
</html>
