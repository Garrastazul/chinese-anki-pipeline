<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>ASGP0KFF - Expressing "and" with "he"</title></head>
<body>
  <h1>Expressing "and" with "he"</h1>

  <table class="table-bordered">
    <tr><th>Hanzi</th><th>Translation</th></tr>
    <tr>
      <td>我 <span class="pinyin">Wǒ</span></td>
      <td>爱 <span class="pinyin">ài</span></td>
      <td>你 <span class="pinyin">nǐ</span>。</td>
      <td>I love you.</td>
    </tr>
    <tr>
      <td>他 <span class="pinyin">Tā</span></td>
      <td>和 <span class="pinyin">hé</span></td>
      <td>我 <span class="pinyin">wǒ</span></td>
      <td>都 <span class="pinyin">dōu</span></td>
      <td>不 <span class="pinyin">bù</span></td>
      <td>去 <span class="pinyin">qù</span>。</td>
      <td>He and I are both not going.</td>
    </tr>
  </table>

  <table class="table-bordered">
    <tr><th>Hanzi</th><th>Translation</th></tr>
    <tr>
      <td>我 <span class="pinyin">Wǒ</span></td>
      <td>和 <span class="pinyin">hé</span></td>
      <td>你 <span class="pinyin">nǐ</span></td>
      <td>都 <span class="pinyin">dōu</span></td>
      <td>是 <span class="pinyin">shì</span></td>
      <td>学生 <span class="pinyin">xuésheng</span>。</td>
      <td>You and I are both students.</td>
    </tr>
  </table>
</body>
</html>
